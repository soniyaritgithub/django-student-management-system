<!DOCTYPE html>
<html>
<head>

<title>Login</title>

<style>

body{
    font-family:Arial;
    background:#f5f5f5;
}

.box{
    width:300px;
    margin:auto;
    margin-top:100px;
    background:white;
    padding:30px;
    border-radius:10px;
}

button{
    width:100%;
    padding:10px;
    background:blue;
    color:white;
    border:none;
}

</style>

</head>

<body>

<div class="box">

<h2>Login</h2>

<form method="POST">

    {% csrf_token %}

    {{ form.as_p }}

    <button type="submit">Login</button>

</form>

</div>

</body>
</html>
